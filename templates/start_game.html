{% extends 'layout.html' %}
{% block content %}
<h2 class="mb-3">Start New Game Instance</h2>
<form method="post" class="card p-3 shadow-sm" style="max-width:700px;">
    <div class="mb-3">
        <label for="game_type_id" class="form-label">Game Type:</label>
        <select name="game_type_id" id="game_type_id" class="form-select" onchange="this.form.submit()" required>
            <option value="">-- Select Game Type --</option>
            {% for gt in game_types %}
            <option value="{{ gt['id'] }}" {% if selected_game_type_id and gt['id']|string == selected_game_type_id|string %}selected{% endif %}>{{ gt['name'] }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="game_pattern_id" class="form-label">Game Pattern:</label>
        <select name="game_pattern_id" id="game_pattern_id" class="form-select" required {% if not selected_game_type_id %}disabled{% endif %}>
            <option value="">-- Select Game --</option>
            {% for game in game_patterns %}
            <option value="{{ game['id'] }}" {% if selected_game_pattern_id and game['id']|string == selected_game_pattern_id|string %}selected{% endif %}>{{ game['name'] }} ({{ game['total_score'] }} pts)</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="instance_name" class="form-label">Game Instance Name (optional):</label>
        <input type="text" name="instance_name" id="instance_name" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Select Players:</label>
        <div class="row">
        {% for player in players %}
            <div class="col-6 col-md-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="player_ids" id="player_{{ player['id'] }}" value="{{ player['id'] }}">
                    <label class="form-check-label" for="player_{{ player['id'] }}">{{ player['name'] }}</label>
                </div>
            </div>
        {% endfor %}
        </div>
    </div>
    <button type="submit" name="start_game" class="btn btn-primary">Start Game</button>
</form>
{% endblock %}
