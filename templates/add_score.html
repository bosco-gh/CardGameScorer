{% extends 'layout.html' %}
{% block content %}
<h2 class="mb-3">Add Score</h2>
<form method="post" class="card p-3 shadow-sm" style="max-width:500px;">
    <div class="mb-3">
        <label for="game_id" class="form-label">Game:</label>
        <select name="game_id" id="game_id" class="form-select" required>
            {% for game in games %}
            <option value="{{ game['id'] }}">Game #{{ game['id'] }} ({{ game['game_type_name'] }}, {{ game['played_at'][:10] }})</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="player_id" class="form-label">Player:</label>
        <select name="player_id" id="player_id" class="form-select" required>
            {% for player in players %}
            <option value="{{ player['id'] }}">{{ player['name'] }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="score" class="form-label">Score:</label>
        <input type="number" name="score" id="score" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Add</button>
</form>
{% endblock %}
