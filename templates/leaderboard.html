{% extends 'layout.html' %}
{% block content %}
<h2 class="mb-3">Leaderboard</h2>
<form method="get" class="mb-3">
    <div class="row g-2 align-items-center">
        <div class="col-auto">
            <label for="game_type_id" class="col-form-label">Filter by Game Type:</label>
        </div>
        <div class="col-auto">
            <select name="game_type_id" id="game_type_id" class="form-select" onchange="this.form.submit()">
                <option value="">All</option>
                {% for gt in game_types %}
                <option value="{{ gt['id'] }}" {% if selected_game_type == gt['id'] %}selected{% endif %}>{{ gt['name'] }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
</form>
{% if leaderboard %}
<table class="table table-striped table-bordered">
    <thead class="table-dark"><tr><th>Rank</th><th>Name</th><th>Total Score</th></tr></thead>
    <tbody>
    {% for player in leaderboard %}
    <tr>
        <td>{{ loop.index }}</td>
        <td>{{ player['name'] }}</td>
        <td>{{ player['total_score'] }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% else %}
<p>No scores yet.</p>
{% endif %}
{% endblock %}
